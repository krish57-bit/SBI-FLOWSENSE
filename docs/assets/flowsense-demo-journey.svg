<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">SBI FlowSense demo journey storyboard</title>
  <desc id="desc">A visual storyboard for the first salary in a new city demo flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061426"/>
      <stop offset="1" stop-color="#0c3444"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="540" rx="28" fill="url(#bg)"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="72" y="68" fill="#e0f2fe" font-size="34" font-weight="800">Demo Storyboard</text>
    <text x="72" y="99" fill="#9bdcff" font-size="17">First salary in a new city -> recommendation -> consent -> execution -> audit.</text>
  </g>
  <g transform="translate(72 156)" filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <g>
      <rect x="0" y="0" width="160" height="210" rx="18" fill="url(#card)" stroke="#7dd3fc" stroke-opacity="0.35"/>
      <circle cx="80" cy="62" r="34" fill="#0ea5e9"/>
      <text x="80" y="69" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">1</text>
      <text x="80" y="122" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">Events</text>
      <text x="80" y="150" text-anchor="middle" fill="#bae6fd" font-size="13">Salary credit</text>
      <text x="80" y="171" text-anchor="middle" fill="#bae6fd" font-size="13">Rent payment</text>
    </g>
    <g transform="translate(190 0)">
      <rect x="0" y="0" width="160" height="210" rx="18" fill="url(#card)" stroke="#7dd3fc" stroke-opacity="0.35"/>
      <circle cx="80" cy="62" r="34" fill="#22c55e"/>
      <text x="80" y="69" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">2</text>
      <text x="80" y="122" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">Detect</text>
      <text x="80" y="150" text-anchor="middle" fill="#bbf7d0" font-size="13">FIRST_SALARY</text>
      <text x="80" y="171" text-anchor="middle" fill="#bbf7d0" font-size="13">RELOCATION</text>
    </g>
    <g transform="translate(380 0)">
      <rect x="0" y="0" width="160" height="210" rx="18" fill="url(#card)" stroke="#7dd3fc" stroke-opacity="0.35"/>
      <circle cx="80" cy="62" r="34" fill="#8b5cf6"/>
      <text x="80" y="69" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">3</text>
      <text x="80" y="122" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">Journey</text>
      <text x="80" y="150" text-anchor="middle" fill="#ddd6fe" font-size="13">Create steps</text>
      <text x="80" y="171" text-anchor="middle" fill="#ddd6fe" font-size="13">Assign agent</text>
    </g>
    <g transform="translate(570 0)">
      <rect x="0" y="0" width="160" height="210" rx="18" fill="url(#card)" stroke="#7dd3fc" stroke-opacity="0.35"/>
      <circle cx="80" cy="62" r="34" fill="#06b6d4"/>
      <text x="80" y="69" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">4</text>
      <text x="80" y="122" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">Agent</text>
      <text x="80" y="150" text-anchor="middle" fill="#cffafe" font-size="13">Salary account</text>
      <text x="80" y="171" text-anchor="middle" fill="#cffafe" font-size="13">SIP suggestion</text>
    </g>
    <g transform="translate(760 0)">
      <rect x="0" y="0" width="160" height="210" rx="18" fill="url(#card)" stroke="#7dd3fc" stroke-opacity="0.35"/>
      <circle cx="80" cy="62" r="34" fill="#f59e0b"/>
      <text x="80" y="69" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">5</text>
      <text x="80" y="122" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">Consent</text>
      <text x="80" y="150" text-anchor="middle" fill="#fde68a" font-size="13">Approve action</text>
      <text x="80" y="171" text-anchor="middle" fill="#fde68a" font-size="13">Record decision</text>
    </g>
    <g transform="translate(950 0)">
      <rect x="0" y="0" width="160" height="210" rx="18" fill="url(#card)" stroke="#7dd3fc" stroke-opacity="0.35"/>
      <circle cx="80" cy="62" r="34" fill="#ef4444"/>
      <text x="80" y="69" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">6</text>
      <text x="80" y="122" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="800">Audit</text>
      <text x="80" y="150" text-anchor="middle" fill="#fecaca" font-size="13">Execute mock</text>
      <text x="80" y="171" text-anchor="middle" fill="#fecaca" font-size="13">Trace log</text>
    </g>
  </g>
  <g stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.85">
    <path d="M232 262 L262 262"/>
    <path d="M422 262 L452 262"/>
    <path d="M612 262 L642 262"/>
    <path d="M802 262 L832 262"/>
    <path d="M992 262 L1022 262"/>
  </g>
  <g transform="translate(190 430)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="820" height="62" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="410" y="38" text-anchor="middle" fill="#dff7ff" font-size="15" font-weight="700">Pitch line: FlowSense turns banking from reactive offers into safe, explainable, event-driven journeys.</text>
  </g>
</svg>
