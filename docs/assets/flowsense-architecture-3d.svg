<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">SBI FlowSense layered 3D architecture</title>
  <desc id="desc">Layered 3D architecture showing React experience, FastAPI intelligence services, Kafka messaging, MongoDB data collections, and consent governance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#e8f7ff"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ccfbf1"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ede9fe"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="700" rx="30" fill="url(#bg)"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="70" y="70" fill="#0f172a" font-size="36" font-weight="800">Layered Architecture</text>
    <text x="70" y="102" fill="#475569" font-size="17">Experience, intelligence, messaging, data, and governance in one auditable flow.</text>
  </g>
  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(150 138)">
      <polygon points="0,62 450,0 900,62 450,132" fill="url(#layer1)"/>
      <polygon points="0,62 450,132 450,175 0,103" fill="#2563eb"/>
      <polygon points="900,62 450,132 450,175 900,103" fill="#1d4ed8"/>
      <text x="450" y="68" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="800">Experience Layer</text>
      <text x="450" y="96" text-anchor="middle" fill="#1e3a8a" font-size="15">React + Vite dashboard, journey cards, AI agent panels, SSE updates</text>
    </g>
    <g transform="translate(150 270)">
      <polygon points="0,62 450,0 900,62 450,132" fill="url(#layer2)"/>
      <polygon points="0,62 450,132 450,175 0,103" fill="#0f766e"/>
      <polygon points="900,62 450,132 450,175 900,103" fill="#115e59"/>
      <text x="450" y="64" text-anchor="middle" fill="#052e2b" font-size="24" font-weight="800">Intelligence Layer</text>
      <text x="450" y="94" text-anchor="middle" fill="#064e3b" font-size="15">Event ingestion, life-event detection, journey orchestration, micro-agents</text>
    </g>
    <g transform="translate(150 402)">
      <polygon points="0,62 450,0 900,62 450,132" fill="url(#layer3)"/>
      <polygon points="0,62 450,132 450,175 0,103" fill="#6d28d9"/>
      <polygon points="900,62 450,132 450,175 900,103" fill="#5b21b6"/>
      <text x="450" y="64" text-anchor="middle" fill="#2e1065" font-size="24" font-weight="800">Messaging And Data Layer</text>
      <text x="450" y="94" text-anchor="middle" fill="#4c1d95" font-size="15">Kafka topics plus MongoDB collections for events, journeys, actions, consents, audit</text>
    </g>
    <g transform="translate(150 534)">
      <polygon points="0,62 450,0 900,62 450,132" fill="url(#layer4)"/>
      <polygon points="0,62 450,132 450,175 0,103" fill="#b45309"/>
      <polygon points="900,62 450,132 450,175 900,103" fill="#92400e"/>
      <text x="450" y="64" text-anchor="middle" fill="#451a03" font-size="24" font-weight="800">Governance Layer</text>
      <text x="450" y="94" text-anchor="middle" fill="#78350f" font-size="15">Consent-first execution, agent boundaries, execution guard, immutable audit trail</text>
    </g>
  </g>
  <g stroke="#0f172a" stroke-opacity="0.25" stroke-width="2" stroke-dasharray="8 10">
    <path d="M600 248 L600 270"/>
    <path d="M600 380 L600 402"/>
    <path d="M600 512 L600 534"/>
  </g>
</svg>
