<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">SBI FlowSense 3D system overview</title>
  <desc id="desc">A 3D-style banking intelligence pipeline from transaction events to life-event detection, journey orchestration, micro-agents, consent execution, and audit trail.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.45" stop-color="#0d284b"/>
      <stop offset="1" stop-color="#062f36"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="28" fill="url(#grid)"/>
  <g opacity="0.22">
    <ellipse cx="230" cy="100" rx="180" ry="70" fill="#2dd4bf"/>
    <ellipse cx="960" cy="420" rx="210" ry="80" fill="#60a5fa"/>
  </g>
  <g transform="translate(72 52)">
    <text x="0" y="0" fill="#dbeafe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="800">SBI FlowSense</text>
    <text x="0" y="36" fill="#9cc9ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Agentic journey brain for consent-first banking interventions</text>
  </g>
  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(78 165)">
      <polygon points="0,42 98,0 196,42 98,88" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.65"/>
      <polygon points="0,42 98,88 98,136 0,90" fill="#0b2746"/>
      <polygon points="196,42 98,88 98,136 196,90" fill="#082f49"/>
      <polygon points="0,42 98,0 196,42 98,88" fill="url(#cyan)" opacity="0.82"/>
      <text x="98" y="49" text-anchor="middle" fill="#031320" font-size="15" font-weight="800">EVENTS</text>
      <text x="98" y="70" text-anchor="middle" fill="#082f49" font-size="12">salary, rent, card</text>
    </g>
    <g transform="translate(270 165)">
      <polygon points="0,42 98,0 196,42 98,88" fill="url(#blue)" opacity="0.88"/>
      <polygon points="0,42 98,88 98,136 0,90" fill="#1e3a8a"/>
      <polygon points="196,42 98,88 98,136 196,90" fill="#172554"/>
      <text x="98" y="45" text-anchor="middle" fill="#eff6ff" font-size="15" font-weight="800">DETECT</text>
      <text x="98" y="68" text-anchor="middle" fill="#bfdbfe" font-size="12">life events</text>
    </g>
    <g transform="translate(462 165)">
      <polygon points="0,42 98,0 196,42 98,88" fill="#a78bfa" opacity="0.9"/>
      <polygon points="0,42 98,88 98,136 0,90" fill="#5b21b6"/>
      <polygon points="196,42 98,88 98,136 196,90" fill="#4c1d95"/>
      <text x="98" y="45" text-anchor="middle" fill="#faf5ff" font-size="15" font-weight="800">JOURNEY</text>
      <text x="98" y="68" text-anchor="middle" fill="#ede9fe" font-size="12">templates</text>
    </g>
    <g transform="translate(654 165)">
      <polygon points="0,42 98,0 196,42 98,88" fill="url(#green)" opacity="0.9"/>
      <polygon points="0,42 98,88 98,136 0,90" fill="#166534"/>
      <polygon points="196,42 98,88 98,136 196,90" fill="#14532d"/>
      <text x="98" y="45" text-anchor="middle" fill="#052e16" font-size="15" font-weight="800">AGENTS</text>
      <text x="98" y="68" text-anchor="middle" fill="#064e3b" font-size="12">recommend</text>
    </g>
    <g transform="translate(846 165)">
      <polygon points="0,42 98,0 196,42 98,88" fill="url(#gold)" opacity="0.95"/>
      <polygon points="0,42 98,88 98,136 0,90" fill="#92400e"/>
      <polygon points="196,42 98,88 98,136 196,90" fill="#78350f"/>
      <text x="98" y="45" text-anchor="middle" fill="#451a03" font-size="15" font-weight="800">CONSENT</text>
      <text x="98" y="68" text-anchor="middle" fill="#78350f" font-size="12">execute + audit</text>
    </g>
  </g>
  <g stroke="#93c5fd" stroke-width="3" stroke-linecap="round" opacity="0.75">
    <path d="M 257 208 C 276 190, 287 190, 307 208"/>
    <path d="M 449 208 C 468 190, 479 190, 499 208"/>
    <path d="M 641 208 C 660 190, 671 190, 691 208"/>
    <path d="M 833 208 C 852 190, 863 190, 883 208"/>
  </g>
  <g transform="translate(150 380)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="900" height="72" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="34" y="31" fill="#e0f2fe" font-size="15" font-weight="700">Judge-friendly proof:</text>
    <text x="34" y="54" fill="#badcff" font-size="14">Every recommendation is traceable from raw event to life event, journey, consent, execution record, and immutable audit log.</text>
  </g>
</svg>
