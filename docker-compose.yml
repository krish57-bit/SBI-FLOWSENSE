version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # API Gateway + Event Ingestion + SSE + Consent/Execution
  event-ingestion:
    build: ./services/event-ingestion
    ports:
      - "8001:8001"
    environment:
      KAFKA_BROKER: kafka:29092
      MONGO_URI: mongodb://mongodb:27017
    depends_on:
      - kafka
      - mongodb

  # Life-Event Detector: transaction-events → life-events
  life-event-detector:
    build: ./services/life-event-detector
    environment:
      KAFKA_BROKER: kafka:29092
      MONGO_URI: mongodb://mongodb:27017
    depends_on:
      - kafka
      - mongodb

  # Journey Orchestrator: life-events → agent-actions
  orchestrator:
    build: ./services/orchestrator-agents
    environment:
      KAFKA_BROKER: kafka:29092
      MONGO_URI: mongodb://mongodb:27017
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      - kafka
      - mongodb
      - event-ingestion

volumes:
  mongodb_data:
